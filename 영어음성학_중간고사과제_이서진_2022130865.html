<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤 여행 기록장</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        body {
            font-family: 'Jua', sans-serif;
            background-color: #ffffff;
            color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; position: relative; }

        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .editable-title {
            margin: 0;
            font-size: 2.2rem;
            border: 2px dashed transparent;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: text;
            outline: none;
            text-align: center;
        }
        .editable-title:hover { background-color: #f9f9f9; }

        .pdf-btn {
            position: absolute;
            right: 0;
            background-color: #000;
            color: #fff;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px #aaa;
        }

        /* 체크리스트 스타일 */
        .checklist-section {
            width: 100%;
            margin-bottom: 20px;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 15px;
            background-color: #fff;
            box-sizing: border-box;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .checklist-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .summary-section {
            border: 3px solid #000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 6px 6px 0px #000;
            background-color: #fff;
        }

        .summary-flex { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; }
        .summary-item { width: calc(50% - 10px); display: flex; flex-direction: column; gap: 5px; }

        input, textarea, select {
            border: 2px solid #000;
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            background-color: #fff;
        }
        
        .weather-box {
            background-color: #000;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            min-height: 50px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 3px solid #000;
            border-radius: 10px;
            box-shadow: 6px 6px 0px #000;
            table-layout: fixed;
            background-color: #fff;
        }

        th { background-color: #f0f0f0; border-bottom: 3px solid #000; padding: 12px; }
        td { border-bottom: 2px solid #000; padding: 10px; vertical-align: middle; text-align: center; }
        
        .photo-cell {
            width: 100%;
            height: 90px; 
            border: 2px dashed #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
            background-color: #fafafa;
            overflow: hidden;
        }
        .photo-cell img { width: 100%; height: 100%; object-fit: cover; }

        .add-btn {
            background-color: #fff;
            border: 3px solid #000;
            border-radius: 20px;
            padding: 8px 15px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            white-space: nowrap;
        }

        /* 🖨️ 인쇄 설정 */
        @media print {
            #top-summary-section { display: none !important; }
            .hide-in-pdf, .pdf-btn, .toggle-btn-area, .checklist-toggle-btn { display: none !important; }
            
            body.print-itinerary-only #settlement-container, body.print-itinerary-only .checklist-section { display: none !important; }
            body.print-settlement-only #pdf-area, body.print-settlement-only .header-area, body.print-settlement-only .checklist-section { display: none !important; }
            body.print-settlement-only #settlement-section { display: block !important; }
            
            table { page-break-inside: auto; box-shadow: none !important; border: 2px solid #000 !important; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; } 

            input, textarea, select {
                border: 2px solid #000 !important;      
                background-color: #fff !important;      
                border-radius: 8px !important;          
                appearance: none !important;
                -webkit-appearance: none !important;
                padding: 10px !important;
                resize: none !important;
                overflow: hidden !important;
                text-align: center;
            }
            select::-ms-expand { display: none; }
            .page-break { page-break-before: always; }
            ::placeholder { color: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div style="text-align: left; width: 100%; margin-bottom: 10px;">
            <button class="add-btn checklist-toggle-btn" onclick="toggleSection('checklist-content')">✅ 체크리스트 열기/닫기</button>
        </div>
        <div id="checklist-content" class="checklist-section" style="display: none;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-start; align-items: center;">
                <input type="text" id="checklist-input" placeholder="준비물 입력 (예: 여권)" style="width: 250px;" onkeypress="if(event.key==='Enter') addChecklistItem()">
                <button class="add-btn" onclick="addChecklistItem()">추가</button>
            </div>
            <div id="checklist-items" style="display: flex; flex-direction: column; gap: 5px;"></div>
        </div>

        <div class="header-area">
            <h1 class="editable-title" contenteditable="true">✈️ 여행 아카이브</h1>
            <button class="pdf-btn" onclick="saveItineraryAsPDF()">💾 일정표 PDF 저장</button>
        </div>

        <div id="pdf-area">
            <div class="summary-section" id="top-summary-section">
                <div class="summary-flex">
                    <div class="summary-item">
                        <label>📍 여행 장소</label>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="location-input" placeholder="장소 입력 (예: 서울, 제주도)" onkeypress="if(event.key==='Enter') fetchWeather()">
                            <button class="add-btn hide-in-pdf" onclick="fetchWeather()">검색</button>
                        </div>
                    </div>
                    <div class="summary-item">
                        <label>☁️ 현재 날씨</label>
                        <div class="weather-box" id="weather-info">검색하세요!</div>
                    </div>
                    <div class="summary-item">
                        <label>📅 일정</label>
                        <div style="display:flex; gap:5px; align-items:center;">
                            <input type="date" id="start-date" onchange="generateDailyPlans()">
                            <span>~</span>
                            <input type="date" id="end-date" onchange="generateDailyPlans()">
                        </div>
                    </div>
                    <div class="summary-item">
                        <label>📝 주요 정보</label>
                        <textarea rows="2" placeholder="숙소 및 핵심 정보"></textarea>
                    </div>
                </div>
            </div>
            
            <div id="daily-plans-container">
                <div class="hide-in-pdf" style="text-align: center; color: #666; margin-top: 50px;">
                    날짜를 선택하면 표가 생성됩니다!
                </div>
            </div>
        </div>

        <div class="toggle-btn-area" style="text-align: center; margin: 50px 0;">
            <button class="add-btn" style="padding: 10px 20px; background-color: #fff;" onclick="toggleSection('settlement-container')">💰 비용 정산기</button>
        </div>

        <div id="settlement-container" style="display: none; width: 100%;">
            <div class="summary-section" id="settlement-section" style="background-color: #fafafa;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px dashed #000; padding-bottom: 10px;">
                    <h2 style="margin: 0; font-size: 1.5rem;">💸 여행 비용 정산</h2>
                    <button class="add-btn hide-in-pdf" onclick="saveSettlementAsPDF()">💾 정산 PDF 저장</button>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;" class="hide-in-pdf">
                    <input type="text" id="exp-payer" placeholder="누가? (선택)" style="flex: 1;">
                    <input type="text" id="exp-purpose" placeholder="어디서? (내역)" style="flex: 2;">
                    <input type="number" id="exp-amount" placeholder="금액 (원)" style="flex: 1;">
                    <button class="add-btn" onclick="addExpense()">추가</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>결제자</th>
                            <th>내역</th>
                            <th>금액</th>
                            <th class="hide-in-pdf">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="expense-list-body"></tbody>
                </table>

                <div style="text-align: right; margin-top: 15px; font-size: 1.2rem; font-weight: bold;">
                    총 비용: <span id="total-expense">0</span>원
                </div>

                <div class="hide-in-pdf" style="text-align: center; margin-top: 20px;">
                    <button class="add-btn" style="background-color: #000; color: #fff;" onclick="calculateSettlement()">정산하기</button>
                </div>

                <div id="settlement-result" style="margin-top: 20px; padding: 15px; border: 3px dashed #000; border-radius: 10px; display: none; background: #fff;"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'none') ? 'block' : 'none';
        }

        function addChecklistItem() {
            const input = document.getElementById('checklist-input');
            const val = input.value.trim();
            if (!val) return;
            const container = document.getElementById('checklist-items');
            const div = document.createElement('div');
            div.className = 'checklist-item';
            div.innerHTML = `<input type="checkbox"> <span>${val}</span> <span style="cursor:pointer; color:#aaa; font-size:0.8rem; margin-left:5px;" onclick="this.parentElement.remove()">❌</span>`;
            container.appendChild(div);
            input.value = '';
        }

        async function fetchWeather() {
            const input = document.getElementById('location-input').value.trim();
            const weatherBox = document.getElementById('weather-info');
            if(!input) return;
            
            weatherBox.innerHTML = "⏳ 검색 중...";
            
            const cityMap = {
                '서울':'Seoul', '인천':'Incheon', '제주':'Jeju', '제주도':'Jeju', '서귀포':'Seogwipo',
                '부산':'Busan', '대구':'Daegu', '광주':'Gwangju', '대전':'Daejeon', '울산':'Ulsan',
                '강릉':'Gangneung', '속초':'Sokcho', '전주':'Jeonju', '여수':'Yeosu', '경주':'Gyeongju',
                '도쿄':'Tokyo', '오사카':'Osaka', '파리':'Paris', '런던':'London', '뉴욕':'New York'
            };
            const query = cityMap[input] || input;

            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=ko`);
                const data = await res.json();
                if(data.results && data.results.length > 0) {
                    const {latitude: lat, longitude: lon, name} = data.results[0];
                    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const wData = await wRes.json();
                    weatherBox.innerHTML = `🌡️ ${wData.current_weather.temperature}°C <br> 장소: ${name}`;
                } else {
                    weatherBox.innerHTML = "❌ 결과 없음";
                }
            } catch(e) { weatherBox.innerHTML = "⚠️ 오류"; }
        }

        function generateDailyPlans() {
            const s = new Date(document.getElementById('start-date').value);
            const e = new Date(document.getElementById('end-date').value);
            const container = document.getElementById('daily-plans-container');
            if(isNaN(s) || isNaN(e) || s > e) return;
            container.innerHTML = '';
            let cur = new Date(s);
            let d = 1;
            while(cur <= e) {
                const section = document.createElement('div');
                section.className = 'daily-plan-section' + (d > 1 ? ' page-break' : '');
                const tid = `tbody-${d}`;
                section.innerHTML = `<div class="plan-header"><h2>📅 DAY ${d} (${cur.getMonth()+1}/${cur.getDate()})</h2><button class="add-btn hide-in-pdf" onclick="addRow('${tid}')">+ 일정 추가</button></div>
                <table><thead><tr><th style="width:12%">시간</th><th style="width:38%">활동</th><th style="width:30%">메모</th><th style="width:20%">사진</th></tr></thead><tbody id="${tid}"></tbody></table>`;
                container.appendChild(section);
                addRow(tid);
                cur.setDate(cur.getDate()+1); d++;
            }
        }

        function addRow(id) {
            const tb = document.getElementById(id);
            const rid = Math.random().toString(36).substr(2, 5);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <select>${Array.from({length:25},(_,i)=>`<option>${String(i).padStart(2,'0')}:00</option>`).join('')}</select>
                    <div class="hide-in-pdf" style="color:#aaa; font-size:0.6rem; cursor:pointer; margin-top: 8px;" onclick="this.closest('tr').remove()">❌ 삭제</div>
                </td>
                <td><input type="text" placeholder="일정 명"></td>
                <td><textarea rows="1" placeholder="간단 메모" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea></td>
                <td>
                    <input type="file" id="f-${rid}" style="display:none" accept="image/*" onchange="preview(event, 'p-${rid}')">
                    <div class="photo-cell hide-in-pdf" id="btn-${rid}" onclick="document.getElementById('f-${rid}').click()">📷 추가</div>
                    <div class="photo-cell" id="p-${rid}" style="display:none;" onclick="document.getElementById('f-${rid}').click()"></div>
                </td>
            `;
            tb.appendChild(tr);
        }

        function preview(e, pid) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const box = document.getElementById(pid);
                const btn = document.getElementById('btn-' + pid.split('-')[1]);
                btn.style.display = 'none';
                box.style.display = 'flex';
                box.innerHTML = `<img src="${ev.target.result}">`;
            };
            reader.readAsDataURL(file);
        }

        let expenses = [];
        function addExpense() {
            const p = document.getElementById('exp-payer').value.trim();
            const u = document.getElementById('exp-purpose').value.trim();
            const a = parseInt(document.getElementById('exp-amount').value);
            
            if(!u || isNaN(a)) {
                alert("결제 내역과 금액을 꼭 입력해주세요!");
                return;
            }
            expenses.push({p, u, a});
            renderExpenses();
            
            document.getElementById('exp-payer').value=''; 
            document.getElementById('exp-purpose').value=''; 
            document.getElementById('exp-amount').value='';
        }

        function renderExpenses() {
            const body = document.getElementById('expense-list-body');
            body.innerHTML = '';
            let total = 0;
            expenses.forEach((ex, i) => {
                total += ex.a;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${ex.p ? ex.p : '<span style="color:#aaa;">-</span>'}</td><td>${ex.u}</td><td>${ex.a.toLocaleString()}</td><td class="hide-in-pdf"><span style="cursor:pointer; color:#aaa;" onclick="expenses.splice(${i},1);renderExpenses(); document.getElementById('settlement-result').style.display='none';">❌</span></td>`;
                body.appendChild(tr);
            });
            document.getElementById('total-expense').innerText = total.toLocaleString();
        }

        function calculateSettlement() {
            if(expenses.length === 0) return;
            const totals = {};
            let grandForSettlement = 0;
            
            expenses.forEach(ex => { 
                if(ex.p) {
                    totals[ex.p] = (totals[ex.p] || 0) + ex.a; 
                    grandForSettlement += ex.a; 
                }
            });
            
            const people = Object.keys(totals);
            const box = document.getElementById('settlement-result');

            if(people.length === 0) {
                box.innerHTML = "<span style='color:red;'>결제자가 입력된 항목이 없어서 정산할 수 없습니다!</span><br>결제자를 함께 입력해 주세요.";
                box.style.display = 'block';
                return;
            }

            if(people.length === 1) {
                box.innerHTML = `<strong>${people[0]}</strong> 님이 혼자 결제하셨습니다. (정산 대상 금액: ${grandForSettlement.toLocaleString()}원)`;
                box.style.display = 'block';
                return;
            }

            const avg = grandForSettlement / people.length;
            let balances = people.map(name => ({ name, balance: totals[name] - avg }));
            balances.sort((a, b) => a.balance - b.balance);

            let res = "<div style='text-align:center; font-weight:bold; font-size:1.3rem; margin-bottom:10px;'>🤝 이렇게 보내주세요!</div><ul style='list-style-type: none; padding: 0;'>";
            let i = 0, j = balances.length - 1;
            while(i < j) {
                let pay = Math.min(-balances[i].balance, balances[j].balance);
                if(pay > 1) {
                    res += `<li style='margin-bottom: 5px;'><span style='color:red; font-weight:bold;'>${balances[i].name}</span> 님이 <span style='font-weight:bold;'>${balances[j].name}</span> 님에게 <span style='color:blue; font-weight:bold;'>${Math.round(pay).toLocaleString()}원</span> 보내기</li>`;
                }
                balances[i].balance += pay; balances[j].balance -= pay;
                if(Math.abs(balances[i].balance) < 1) i++;
                if(balances[j].balance < 1) j--;
            }
            res += "</ul>";
            
            box.innerHTML = res; 
            box.style.display = 'block';
        }

        function saveItineraryAsPDF() { 
            document.querySelectorAll('#pdf-area textarea').forEach(el => {
                el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px';
            });
            document.body.classList.add('print-itinerary-only'); 
            window.print(); 
            document.body.classList.remove('print-itinerary-only'); 
        }

        function saveSettlementAsPDF() { 
            document.body.classList.add('print-settlement-only'); 
            window.print(); 
            document.body.classList.remove('print-settlement-only'); 
        }
    </script>
</body>
</html>
